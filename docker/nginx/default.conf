upstream intellifarm_frontend {
  server frontend:3000;
}

upstream intellifarm_backend {
  server backend:8000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 32m;

  location = /backend-health {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://intellifarm_backend/health;
  }

  location /api/ws/vision/tasks {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_pass http://intellifarm_backend/api/ws/vision/tasks;
  }

  # Keep all other /api/* requests on Next.js route handlers.
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://intellifarm_frontend;
  }
}

